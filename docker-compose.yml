services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      NODE_ENV: production
      BACKEND_PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      SANDBOX_MAX_CONTAINERS: ${SANDBOX_MAX_CONTAINERS:-20}
      SANDBOX_DEFAULT_TIMEOUT: ${SANDBOX_DEFAULT_TIMEOUT:-300}
      SANDBOX_CLEANUP_INTERVAL: ${SANDBOX_CLEANUP_INTERVAL:-60000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
    networks:
      - internal
      - web

  sandbox-terminal:
    build:
      context: .
      dockerfile: docker/sandbox/terminal-base.Dockerfile
    profiles:
      - build-only

  sandbox-sql:
    build:
      context: .
      dockerfile: docker/sandbox/sql-injection.Dockerfile
    profiles:
      - build-only

  sandbox-linux-lab:
    image: shaked-lab-linux:latest
    build:
      context: .
      dockerfile: docker/sandbox/linux-lab.Dockerfile
    profiles:
      - build-only

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - web

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
